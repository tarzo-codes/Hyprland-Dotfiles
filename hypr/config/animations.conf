# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Ultra-smooth & fluid bezier curves
    bezier = fluid, 0.05, 0.9, 0.1, 1.05
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = oversmooth, 0.13, 0.99, 0.29, 1.08

    # Windows animations
    animation = windows, 1, 4.5, oversmooth, popin 85%
    animation = windowsIn, 1, 4.2, oversmooth, popin 85%
    animation = windowsOut, 1, 3.2, smoothOut, popin 85%
    animation = windowsMove, 1, 3.8, fluid

    # Fade animations
    animation = fade, 1, 3.5, smoothIn
    animation = fadeIn, 1, 3.2, smoothIn
    animation = fadeOut, 1, 2.8, smoothIn

    # Layer shell animations (Quickshell, Mako, Vicinae, Rofi)
    animation = layers, 1, 3.8, oversmooth, fade
    animation = layersIn, 1, 3.5, oversmooth, fade
    animation = layersOut, 1, 2.5, smoothIn, fade

    # Workspaces animations
    animation = workspaces, 1, 4.2, oversmooth, slidefade 15%
    animation = workspacesIn, 1, 4.0, oversmooth, slidefade 15%
    animation = workspacesOut, 1, 3.5, smoothOut, slidefade 15%

    # Borders & active elements
    animation = border, 1, 6, fluid
}
