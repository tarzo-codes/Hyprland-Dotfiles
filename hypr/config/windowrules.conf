# Hyprland 0.55+ Window Rules (Unified Syntax)

# Ignore maximize requests from apps
windowrule = suppress_event = maximize, match:class = .*

# Fix XWayland unmanaged drag windows
windowrule = no_focus = true, match:class = ^$, match:title = ^$, match:xwayland = true, match:float = true

# Floating terminal windows for utility popups
windowrule = float = true, match:class = ^(floating_term)$

# Floating network manager, KDE System Settings & utility applets
windowrule = float = true, match:class = ^(systemsettings)$
windowrule = float = true, match:class = ^(kcmshell6)$
windowrule = float = true, match:class = ^(org.kde.plasmawindowed)$
windowrule = size = 450 550, match:class = ^(org.kde.plasmawindowed)$
windowrule = center = true, match:class = ^(org.kde.plasmawindowed)$
windowrule = float = true, match:class = ^(nm-connection-editor)$
windowrule = float = true, match:class = ^(nm-applet)$
windowrule = float = true, match:class = ^(gnome-control-center)$
windowrule = float = true, match:class = ^(org.gnome.Settings)$
windowrule = float = true, match:title = ^(Network Connections)$
