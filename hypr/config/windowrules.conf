# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Quickshell bar window rules - allow mouse interaction
# Note: Layer shell windows like quickshell don't need no_focus as they receive their own events
